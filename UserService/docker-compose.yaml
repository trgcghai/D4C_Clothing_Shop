services:
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jwt_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - userservice-net

  userservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: userservice
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/jwt_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      JWT_SECRET: DayLaMotChuoiBaoMatCucKyDaiVaPhucTapDeMaHoaJWTToken1234567890
    ports:
      - "8080:8080"
    networks:
      - userservice-net

volumes:
  mariadb_data:

networks:
  userservice-net:

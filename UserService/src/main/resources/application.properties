spring.application.name=UserService
spring.docker.compose.enabled=false
server.port=${SERVER_PORT:8081}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expirationMs=86400000
jwt.refreshExpirationMs=604800000

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# Eureka Client Configuration
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:true}
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:true}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:true}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS:true}

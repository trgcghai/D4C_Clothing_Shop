spring.application.name=UserService
spring.docker.compose.enabled=false
server.port=8081

# JWT Configuration
jwt.expirationMs=86400000
jwt.refreshExpirationMs=604800000

# Database - H2 in-memory for testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# Eureka Client - disabled for tests
eureka.client.enabled=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.instance-id=UserService:localhost:8081
eureka.instance.status-page-url=http://localhost:8081/swagger-ui/index.html
eureka.instance.health-check-url=http://localhost:8081/v3/api-docs

# Redis - disabled for tests
spring.data.redis.host=localhost
spring.data.redis.port=6379

# RabbitMQ - disabled for tests
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

services:
  discovery-server:
    build:
      context: ./DiscoveryServer
      dockerfile: Dockerfile
    container_name: discovery-server
    env_file:
      - ./DiscoveryServer/.env
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - d4c-net

  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "3308:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - d4c-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - d4c-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - d4c-net

  userservice:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    container_name: userservice
    hostname: userservice
    env_file:
      - ./UserService/.env
    depends_on:
      mariadb:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - d4c-net

  productservice:
    build:
      context: ./ProductService
      dockerfile: Dockerfile
    container_name: productservice
    hostname: productservice
    depends_on:
      discovery-server:
        condition: service_healthy
    env_file:
      - ./ProductService/.env
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - d4c-net

  notificationservice:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    container_name: notificationservice
    hostname: notificationservice
    env_file:
      - ./NotificationService/.env
    depends_on:
      mariadb:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - d4c-net

  recommendationservice:
    build:
      context: ./RecommendationService
      dockerfile: Dockerfile
    container_name: recommendationservice
    hostname: recommendationservice
    depends_on:
      discovery-server:
        condition: service_healthy
    env_file:
      - ./RecommendationService/.env
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - d4c-net

  orderservice:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    container_name: orderservice
    hostname: orderservice
    env_file:
      - ./OrderService/.env
    depends_on:
      mariadb:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - d4c-net

  paymentservice:
    build:
      context: ./PaymentService
      dockerfile: Dockerfile
    container_name: paymentservice
    hostname: paymentservice
    env_file:
      - ./PaymentService/.env
    depends_on:
      mariadb:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - d4c-net

  cartservice:
    build:
      context: ./CartService
      dockerfile: Dockerfile
    container_name: cartservice
    hostname: cartservice
    env_file:
      - ./CartService/.env
    depends_on:
      mariadb:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - d4c-net

  aiservice:
    build:
      context: ./AIService
      dockerfile: Dockerfile
    container_name: aiservice
    hostname: aiservice
    env_file:
      - ./AIService/.env
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/api/v1/ai/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - d4c-net

  api-gateway:
    build:
      context: ./Api-Gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    hostname: api-gateway
    env_file:
      - ./Api-Gateway/.env
    depends_on:
      discovery-server:
        condition: service_healthy
      userservice:
        condition: service_healthy
      productservice:
        condition: service_healthy
      notificationservice:
        condition: service_healthy
      orderservice:
        condition: service_healthy
      paymentservice:
        condition: service_healthy
      cartservice:
        condition: service_healthy
      recommendationservice:
        condition: service_healthy
      aiservice:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - d4c-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    env_file:
      - ./frontend/.env
    depends_on:
      api-gateway:
        condition: service_healthy
      productservice:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5173/', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - d4c-net

volumes:
  mariadb_data:
  redis_data:
  rabbitmq_data:

networks:
  d4c-net:
    driver: bridge

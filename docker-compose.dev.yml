services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

  productservice:
    command: ["npm", "run", "dev"]
    volumes:
      - ./ProductService:/app
      - product_node_modules:/app/node_modules

  recommendationservice:
    command: ["npm", "run", "dev"]
    volumes:
      - ./RecommendationService:/app
      - recommendation_node_modules:/app/node_modules

  userservice:
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    ports:
      - "5005:5005"

  api-gateway:
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5006"
    ports:
      - "5006:5006"

  cartservice:
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5009"
    ports:
      - "5009:5009"

  discovery-server:
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007"
    ports:
      - "5007:5007"

  notificationservice:
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5008"
    ports:
      - "5008:5008"

volumes:
  frontend_node_modules:
  product_node_modules:
  recommendation_node_modules:

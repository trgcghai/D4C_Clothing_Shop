services:
  api-gateway:
    build:
      context: ./Api-Gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    hostname: api-gateway
    env_file:
      - ./Api-Gateway/.env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 384M

  userservice:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    container_name: userservice
    hostname: userservice
    env_file:
      - ./UserService/.env
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 384M

  cartservice:

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 512M

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 384M

  typesense:
    image: typesense/typesense:30.2
    container_name: typesense
    restart: unless-stopped
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 256M

  notificationservice:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    container_name: notificationservice
    hostname: notificationservice
    env_file:
      - ./NotificationService/.env
    depends_on:
      discovery-server:
        condition: service_healthy
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 384M

  productservice:
    build:
      context: ./ProductService
      dockerfile: Dockerfile
    container_name: productservice
    hostname: productservice
    env_file:
      - ./ProductService/.env
    depends_on:
      discovery-server:
        condition: service_healthy
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 256M

  recommendationservice:
    build:
      context: ./RecommendationService
      dockerfile: Dockerfile
    container_name: recommendationservice
    hostname: recommendationservice
    env_file:
      - ./RecommendationService/.env
    depends_on:
      discovery-server:
        condition: service_healthy
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 256M

  aiservice:
    build:
      context: ./AIService
      dockerfile: Dockerfile
    container_name: aiservice
    hostname: aiservice
    env_file:
      - ./AIService/.env
    depends_on:
      discovery-server:
        condition: service_healthy
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/api/ai/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 256M

  searchservice:
    build:
      context: ./SearchService
      dockerfile: Dockerfile
    container_name: searchservice
    hostname: searchservice
    env_file:
      - ./SearchService/.env
    depends_on:
      discovery-server:
        condition: service_healthy
    ports:
      - "8089:8089"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  elasticsearch_data:
  typesense-data:

networks:
  d4c-net:
    driver: bridge

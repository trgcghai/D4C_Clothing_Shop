services:
  typesense:
    image: typesense/typesense:30.2
    container_name: typesense
    restart: unless-stopped
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 256M

  notificationservice:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    container_name: notificationservice
    hostname: notificationservice
    env_file:
      - ./NotificationService/.env
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 384M

  productservice:
    build:
      context: ./ProductService
      dockerfile: Dockerfile
    container_name: productservice
    hostname: productservice
    env_file:
      - ./ProductService/.env
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 256M

  recommendationservice:
    build:
      context: ./RecommendationService
      dockerfile: Dockerfile
    container_name: recommendationservice
    hostname: recommendationservice
    env_file:
      - ./RecommendationService/.env
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 256M

  aiservice:
    build:
      context: ./AIService
      dockerfile: Dockerfile
    container_name: aiservice
    hostname: aiservice
    env_file:
      - ./AIService/.env
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/api/ai/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 256M

  searchservice:
    build:
      context: ./SearchService
      dockerfile: Dockerfile
    container_name: searchservice
    hostname: searchservice
    env_file:
      - ./SearchService/.env
    ports:
      - "8089:8089"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - d4c-net
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  typesense-data:

networks:
  d4c-net:
    driver: bridge

spring.application.name=Api-Gateway
server.port=${SERVER_PORT:8080}

spring.cloud.gateway.routes[0].id=userservice-route
spring.cloud.gateway.routes[0].uri=lb://USERSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[1].id=auth-route
spring.cloud.gateway.routes[1].uri=lb://USERSERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[2].id=product-route
spring.cloud.gateway.routes[2].uri=lb://PRODUCTSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/products/**

spring.cloud.gateway.routes[3].id=category-route
spring.cloud.gateway.routes[3].uri=lb://PRODUCTSERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/categories/**

spring.cloud.gateway.routes[4].id=cartservice-route
spring.cloud.gateway.routes[4].uri=lb://CARTSERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/cart/**

spring.cloud.gateway.routes[5].id=user-admin-route
spring.cloud.gateway.routes[5].uri=lb://USERSERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.routes[6].id=order-route
spring.cloud.gateway.routes[6].uri=lb://ORDERSERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[6].filters[0].name=Retry
spring.cloud.gateway.routes[6].filters[0].args.retries=8
spring.cloud.gateway.routes[6].filters[0].args.methods[0]=GET
spring.cloud.gateway.routes[6].filters[0].args.statuses[0]=SERVICE_UNAVAILABLE

spring.cloud.gateway.routes[7].id=payment-route
spring.cloud.gateway.routes[7].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.routes[7].filters[0].name=Retry
spring.cloud.gateway.routes[7].filters[0].args.retries=3
spring.cloud.gateway.routes[7].filters[0].args.methods[0]=GET
spring.cloud.gateway.routes[7].filters[0].args.statuses[0]=SERVICE_UNAVAILABLE

spring.cloud.gateway.routes[8].id=payment-webhook-route
spring.cloud.gateway.routes[8].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/webhooks/**

# Global CORS for browser clients
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.registry-fetch-interval-seconds=5
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME}
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}:${server.port}
eureka.instance.status-page-url=http://${eureka.instance.hostname}:${server.port}/actuator/info
eureka.instance.health-check-url=http://${eureka.instance.hostname}:${server.port}/actuator/health

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# JWKS Configuration
gateway.jwks.url=${JWKS_URL:http://userservice:8081/.well-known/jwks.json}
gateway.jwks.cache-ttl-ms=${JWKS_CACHE_TTL_MS:300000}

name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: discovery-server
            dir: DiscoveryServer
            instance: ec2-1
          - name: api-gateway
            dir: Api-Gateway
            instance: ec2-2
          - name: userservice
            dir: UserService
            instance: ec2-2
          - name: cartservice
            dir: CartService
            instance: ec2-2
          - name: orderservice
            dir: OrderService
            instance: ec2-2
          - name: paymentservice
            dir: PaymentService
            instance: ec2-2
          - name: notificationservice
            dir: NotificationService
            instance: ec2-4
          - name: productservice
            dir: ProductService
            instance: ec2-4
          - name: recommendationservice
            dir: RecommendationService
            instance: ec2-4
          - name: aiservice
            dir: AIService
            instance: ec2-4
          - name: searchservice
            dir: SearchService
            instance: ec2-4

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.dir }}
          file: ./${{ matrix.service.dir }}/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/d4c-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ec2-1:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ contains(needs.build-and-push.result, 'success') }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2-1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_1_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/d4c

            # Update compose file to use new images
            sed -i 's|build:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/d4c-discovery-server:${{ github.sha }}|' docker-compose.yml

            # Pull new image
            docker compose pull

            # Restart services
            docker compose up -d --force-recreate

            # Cleanup
            docker image prune -f

  deploy-ec2-2:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ contains(needs.build-and-push.result, 'success') }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2-2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/d4c

            # Update compose file to use new images
            for service in api-gateway userservice cartservice orderservice paymentservice; do
              sed -i "/$service:/,/^[^ ]/ s|build:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/d4c-$service:${{ github.sha }}|" docker-compose.yml
            done

            # Pull new images
            docker compose pull

            # Restart services
            docker compose up -d --force-recreate

            # Cleanup
            docker image prune -f

  deploy-ec2-4:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ contains(needs.build-and-push.result, 'success') }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2-4
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_4_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/d4c

            # Update compose file to use new images
            for service in notificationservice productservice recommendationservice aiservice searchservice; do
              sed -i "/$service:/,/^[^ ]/ s|build:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/d4c-$service:${{ github.sha }}|" docker-compose.yml
            done

            # Pull new images
            docker compose pull

            # Restart services
            docker compose up -d --force-recreate

            # Cleanup
            docker image prune -f

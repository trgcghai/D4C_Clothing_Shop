name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: discovery-server
            dir: DiscoveryServer
          - name: api-gateway
            dir: Api-Gateway
          - name: userservice
            dir: UserService
          - name: cartservice
            dir: CartService
          - name: orderservice
            dir: OrderService
          - name: paymentservice
            dir: PaymentService
          - name: notificationservice
            dir: NotificationService
          - name: productservice
            dir: ProductService
          - name: recommendationservice
            dir: RecommendationService
          - name: aiservice
            dir: AIService
          - name: searchservice
            dir: SearchService

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ matrix.service.name }})
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: |
            docker buildx build \
              --context ./${{ matrix.service.dir }} \
              --file ./${{ matrix.service.dir }}/Dockerfile \
              --push \
              --tag ${{ env.DOCKERHUB_USERNAME }}/d4c-${{ matrix.service.name }}:latest \
              --cache-from type=gha \
              --cache-to type=gha,mode=min \
              --provenance false \
              --sbom false

  deploy-ec2-1:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_1_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/d4c
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/d4c-discovery-server:latest
            docker tag ${{ secrets.DOCKERHUB_USERNAME }}/d4c-discovery-server:latest d4c-discovery-server:latest
            docker compose up -d --force-recreate discovery-server
            docker image prune -f

  deploy-ec2-2:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/d4c
            for svc in api-gateway userservice cartservice orderservice paymentservice; do
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/d4c-$svc:latest
              docker tag ${{ secrets.DOCKERHUB_USERNAME }}/d4c-$svc:latest d4c-$svc:latest
            done
            docker compose up -d --force-recreate
            sleep 90
            docker compose restart api-gateway
            docker image prune -f

  deploy-ec2-4:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_4_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/d4c
            for svc in notificationservice productservice recommendationservice aiservice searchservice; do
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/d4c-$svc:latest
              docker tag ${{ secrets.DOCKERHUB_USERNAME }}/d4c-$svc:latest d4c-$svc:latest
            done
            docker compose up -d --force-recreate
            sleep 30
            docker image prune -f
